<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <title>Entrata Parcheggio</title>
</head>

<body
    class="bg-linear-to-br from-violet-800 to-black text-white min-h-screen p-10 flex flex-col justify-center items-center">

    <div class="flex flex-col justify-center items-center w-full gap-y-8">

        <div class="flex flex-col justify-center items-center">
            <h1 class="text-4xl font-bold text-center mb-2">🚗 Entrata nel Parcheggio 🚗</h1>
            <p class="text-center text-white/80 mb-3">Inserisci i dati della macchina</p>
            <a class="flex justify-center items-center w-44 h-10 rounded-lg bg-white text-violet-800 hover:bg-white/5 hover:text-white hover:border-2 hover:border-white transition-all duration-300" href="index.html" >Menù Principale</a>
        </div>

        <div class="w-[40%] flex flex-col gap-y-5 bg-white/5 border border-white rounded-2xl p-8">

            <!-- TARGA -->
            <div class="flex flex-col gap-y-1">
                <label class="text-white/70 text-sm uppercase">Targa</label>
                <input id="inputTarga" type="text" placeholder="Es. AB123CD" maxlength="7"
                    class="px-4 py-2 rounded-lg bg-white/10 border border-white/30 text-white placeholder-white/40 focus:outline-none focus:border-violet-400" />
                <p id="errTarga" class="text-red-400 text-sm hidden"></p>
            </div>

            <!-- MARCA -->
            <div class="flex flex-col gap-y-1">
                <label class="text-white/70 text-sm uppercase">Marca</label>
                <select id="selectMarca"
                    class="px-4 py-2 rounded-lg bg-white/10 border border-white/30 text-white focus:outline-none focus:border-violet-400">
                    <option value="" disabled selected class="bg-gray-900">Seleziona una marca</option>
                </select>
                <div id="inputAltraWrapper" class="hidden">
                    <input id="inputAltraMarca" type="text" placeholder="Inserisci la marca"
                        class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/30 text-white placeholder-white/40 focus:outline-none focus:border-violet-400" />
                </div>
            </div>

            <!-- POSIZIONE -->
            <div class="flex flex-col gap-y-1">
                <label class="text-white/70 text-sm uppercase">Posizione</label>
                <input id="inputPos" type="number" placeholder="Es. 101"
                    class="px-4 py-2 rounded-lg bg-white/10 border border-white/30 text-white placeholder-white/40 focus:outline-none focus:border-violet-400" />
                <p id="errPos" class="text-red-400 text-sm hidden"></p>
            </div>

            <!-- BOTTONE -->
            <button onclick="entra()"
                class="w-full mt-2 px-4 py-2 bg-violet-600 hover:bg-white/5 border border-transparent hover:border-white transition-all duration-300 rounded-lg text-white">
                Entra nel Parcheggio
            </button>

            <!-- MESSAGGIO SUCCESSO -->
            <p id="successo" class="text-green-400 text-center hidden">✅ Macchina inserita con successo!</p>

        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
