<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <title>Singola Macchina</title>
</head>

<body class="bg-linear-to-br from-violet-800 to-black text-white min-h-screen p-10 flex flex-col justify-center items-center">

    <div class="flex flex-col justify-center items-center w-full gap-y-8">

        <div class="flex flex-col justify-center items-center">
            <h1 class="text-4xl font-bold text-center mb-2">🔍 Cerca Macchina 🔍</h1>
            <p class="text-center text-white/80 mb-3">Cerca una macchina per ID, Targa o Posizione</p>
            <a class="flex justify-center items-center w-44 h-10 rounded-lg bg-white text-violet-800 hover:bg-white/5 hover:text-white hover:border-2 hover:border-white transition-all duration-300" href="index.html" >Menù Principale</a>
        </div>

        <div class="w-[75%] grid grid-cols-3 gap-10">

            <!-- CERCA PER ID -->
            <div class="flex flex-col justify-center items-center gap-y-3 p-5 bg-white/5 rounded-2xl border border-white">
                <h2 class="text-xl font-semibold">Cerca per ID</h2>
                <p class="text-white/70 text-center">Inserisci l'ID <br>dell'auto</p>
                <input id="inputId" type="number" placeholder="Es. 1"
                    class="w-[80%] px-4 py-2 rounded-lg bg-white/10 border border-white/30 text-white placeholder-white/40 focus:outline-none focus:border-violet-400"/>
                <button onclick="cercaPer('Id_Auto', document.getElementById('inputId').value)"
                    class="w-[80%] px-4 py-2 bg-violet-600 hover:bg-white/5 border border-transparent hover:border-white transition-all duration-300 rounded-lg text-white text-center">
                    Cerca
                </button>
            </div>

            <!-- CERCA PER TARGA -->
            <div class="flex flex-col justify-center items-center gap-y-3 p-5 bg-white/5 rounded-2xl border border-white">
                <h2 class="text-xl font-semibold">Cerca per Targa</h2>
                <p class="text-white/70 text-center">Inserisci la targa <br>dell'auto</p>
                <input id="inputTarga" type="text" placeholder="Es. AB123CD"
                    class="w-[80%] px-4 py-2 rounded-lg bg-white/10 border border-white/30 text-white placeholder-white/40 focus:outline-none focus:border-violet-400"/>
                <button onclick="cercaPer('Targa', document.getElementById('inputTarga').value)"
                    class="w-[80%] px-4 py-2 bg-violet-600 hover:bg-white/5 border border-transparent hover:border-white transition-all duration-300 rounded-lg text-white text-center">
                    Cerca
                </button>
            </div>

            <!-- CERCA PER POSIZIONE -->
            <div class="flex flex-col justify-center items-center gap-y-3 p-5 bg-white/5 rounded-2xl border border-white">
                <h2 class="text-xl font-semibold">Cerca per Posizione</h2>
                <p class="text-white/70 text-center">Inserisci la posizione <br>dell'auto</p>
                <input id="inputPos" type="number" placeholder="Es. 101"
                    class="w-[80%] px-4 py-2 rounded-lg bg-white/10 border border-white/30 text-white placeholder-white/40 focus:outline-none focus:border-violet-400"/>
                <button onclick="cercaPer('posizione', document.getElementById('inputPos').value)"
                    class="w-[80%] px-4 py-2 bg-violet-600 hover:bg-white/5 border border-transparent hover:border-white transition-all duration-300 rounded-lg text-white text-center">
                    Cerca
                </button>
            </div>

        </div>

        <!-- RISULTATO -->
        <div id="risultato" class="w-[75%] hidden overflow-hidden rounded-2xl border border-white/20">
            <table class="w-full text-left ">
                <thead class="bg-white/10 text-white/70 uppercase text-sm ">
                    <tr>
                        <th class="px-6 py-4">ID</th>
                        <th class="px-6 py-4">Targa</th>
                        <th class="px-6 py-4">Marca</th>
                        <th class="px-6 py-4">Posizione</th>
                        <th class="px-6 py-4">Ora Entrata</th>
                    </tr>
                </thead>
                <tbody id="tbody" class="divide-y divide-white/10">
                </tbody>
            </table>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
